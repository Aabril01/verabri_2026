<ion-header>
  <ion-toolbar class="toolbar-verabri">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Volver"></ion-back-button>
    </ion-buttons>
    <ion-title>Cocina — Pedidos</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cargarPedidos()">
        <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="pedidos-content">

  <div class="estado-vacio" *ngIf="!cargando && pedidos.length === 0">
    <svg class="empty-ilustracion" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
      <circle cx="120" cy="120" r="110" fill="var(--vb-card)" />
      <circle cx="60" cy="50" r="8" fill="var(--vb-acento)" opacity="0.5" />
      <circle cx="190" cy="70" r="5" fill="var(--vb-acento)" opacity="0.4" />
      <circle cx="195" cy="180" r="7" fill="var(--vb-acento)" opacity="0.4" />
      <rect x="70" y="55" width="100" height="135" rx="14" fill="var(--vb-fondo)" stroke="var(--vb-acento)" stroke-width="3" />
      <rect x="95" y="42" width="50" height="26" rx="8" fill="var(--vb-acento)" />
      <line x1="90" y1="95" x2="150" y2="95" stroke="var(--vb-texto-suave)" stroke-width="4" stroke-linecap="round" opacity="0.5" />
      <line x1="90" y1="115" x2="150" y2="115" stroke="var(--vb-texto-suave)" stroke-width="4" stroke-linecap="round" opacity="0.5" />
      <line x1="90" y1="135" x2="130" y2="135" stroke="var(--vb-texto-suave)" stroke-width="4" stroke-linecap="round" opacity="0.5" />
      <circle cx="120" cy="168" r="26" fill="var(--vb-exito)" />
      <path d="M108 168 L117 177 L134 158" fill="none" stroke="var(--vb-blanco)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <h3>No hay pedidos pendientes</h3>
    <p>Cuando el mozo confirme un pedido aparecerá acá</p>
    <ion-button fill="solid" class="boton-refrescar" (click)="cargarPedidos()">
      <ion-icon name="refresh-outline" slot="start"></ion-icon>
      Actualizar
    </ion-button>
  </div>

  <div class="lista-contenedor" *ngIf="pedidos.length > 0">
    <div class="pedido-card" *ngFor="let pedido of pedidos">

      <div class="pedido-header">
        <div class="pedido-mesa">
          <ion-icon name="restaurant-outline"></ion-icon>
          <span>Mesa {{ pedido.mesas?.numero }}</span>
        </div>
        <div class="pedido-hora">{{ formatearFecha(pedido.created_at) }}</div>
      </div>

      <div class="pedido-items">
        <div class="item-row" *ngFor="let item of getPlatosDelPedido(pedido)">
          <span class="item-cantidad">{{ item.cantidad }}x</span>
          <span class="item-nombre">{{ item.productos?.nombre }}</span>
          <span class="item-tiempo">
            <ion-icon name="time-outline"></ion-icon>
            {{ item.productos?.tiempo_min }} min
          </span>
        </div>
      </div>

      <div class="pedido-acciones">
        <ion-button expand="block" color="success" (click)="marcarListo(pedido)">
          <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
          Platos listos
        </ion-button>
      </div>

    </div>
  </div>

</ion-content>
