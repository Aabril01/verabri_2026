<ion-content [fullscreen]="true" class="home-content">

  <div class="home-header">
    <img src="assets/logo.png" class="home-logo"/>
    <h1 class="home-titulo">VERABRI</h1>
    <p class="home-subtitulo">Bienvenido al sistema</p>
  </div>

  <div class="home-usuario">
    <ion-icon name="person-circle-outline" class="usuario-icono"></ion-icon>
    <p class="usuario-texto">Sesión iniciada correctamente</p>
  </div>

  <div class="home-acciones">
    <ion-button 
      expand="block" 
      class="boton-cerrar"
      (click)="cerrarSesion()">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Cerrar sesión
    </ion-button>
  </div>

</ion-content>
